# Caddy site block for the Peer39 MCP Connector.
# Drop this into /etc/caddy/Caddyfile.d/ on the droplet.
# Subdomain mcp-connector.scatter-brain.ai → 174.138.92.250 (the shared
# alex-second-brain droplet). Caddy auto-fetches a Let's Encrypt cert on
# first request — first request after deploy is ~3-5s slow, subsequent fast.

mcp-connector.scatter-brain.ai {
    encode gzip
    reverse_proxy 127.0.0.1:3001
    log {
        output file /var/log/peer39-mcp/access.log
        format json
    }
    header {
        Strict-Transport-Security "max-age=31536000"
        X-Content-Type-Options "nosniff"
        Referrer-Policy "no-referrer"
    }
}
