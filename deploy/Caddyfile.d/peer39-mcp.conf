# Caddy site block for the Peer39 MCP Connector.
# Drop this into /etc/caddy/Caddyfile.d/ on the droplet.
# Set PEER39_MCP_DOMAIN before running setup-droplet.sh, OR edit this file
# to replace `peer39-mcp.example.com` with your real subdomain.

peer39-mcp.example.com {
    encode gzip
    reverse_proxy 127.0.0.1:3001
    log {
        output file /var/log/peer39-mcp/access.log
        format json
    }
    header {
        Strict-Transport-Security "max-age=31536000"
        X-Content-Type-Options "nosniff"
        Referrer-Policy "no-referrer"
    }
}
